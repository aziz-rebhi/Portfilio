<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Startup Management Desktop Application built with C++ and Qt">
  <defs>
    <linearGradient id="qtBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="qtAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#qtBg)"/>
  <!-- window chrome -->
  <rect x="40" y="50" width="520" height="300" rx="12" fill="#111827" stroke="#1e293b" stroke-width="2"/>
  <rect x="40" y="50" width="520" height="36" rx="12" fill="#0a0e17"/>
  <circle cx="66" cy="68" r="5" fill="#ef4444"/>
  <circle cx="84" cy="68" r="5" fill="#f59e0b"/>
  <circle cx="102" cy="68" r="5" fill="#22c55e"/>
  <rect x="40" y="80" width="520" height="6" fill="#0a0e17"/>
  <!-- sidebar -->
  <rect x="56" y="98" width="120" height="236" rx="6" fill="#0f172a"/>
  <rect x="68" y="112" width="96" height="10" rx="3" fill="#06b6d4" opacity="0.8"/>
  <rect x="68" y="134" width="80" height="8" rx="3" fill="#334155"/>
  <rect x="68" y="152" width="88" height="8" rx="3" fill="#334155"/>
  <rect x="68" y="170" width="64" height="8" rx="3" fill="#334155"/>
  <rect x="68" y="188" width="92" height="8" rx="3" fill="#334155"/>
  <!-- main content -->
  <rect x="192" y="98" width="352" height="40" rx="6" fill="#0f172a"/>
  <text x="206" y="123" font-family="monospace" font-size="13" fill="#94a3b8">Startup Management</text>
  <rect x="478" y="108" width="52" height="20" rx="10" fill="url(#qtAccent)"/>
  <rect x="192" y="150" width="352" height="184" rx="6" fill="#0f172a"/>
  <!-- table rows -->
  <g font-family="monospace" font-size="11" fill="#64748b">
    <rect x="206" y="166" width="320" height="22" rx="3" fill="#1e293b"/>
    <text x="214" y="181" fill="#06b6d4">ID</text>
    <text x="252" y="181" fill="#06b6d4">Name</text>
    <text x="372" y="181" fill="#06b6d4">Status</text>
    <text x="476" y="181" fill="#06b6d4">Action</text>
    <rect x="206" y="196" width="320" height="22" rx="3" fill="#111827"/>
    <text x="214" y="211">01</text><text x="252" y="211">Nova Tech</text><text x="372" y="211" fill="#22c55e">Active</text>
    <rect x="206" y="226" width="320" height="22" rx="3" fill="#0f172a"/>
    <text x="214" y="241">02</text><text x="252" y="241">Quantum Lab</text><text x="372" y="241" fill="#22c55e">Active</text>
    <rect x="206" y="256" width="320" height="22" rx="3" fill="#111827"/>
    <text x="214" y="271">03</text><text x="252" y="271">Vertex AI</text><text x="372" y="271" fill="#f59e0b">Pending</text>
    <rect x="206" y="286" width="320" height="22" rx="3" fill="#0f172a"/>
    <text x="214" y="301">04</text><text x="252" y="301">Helix Bio</text><text x="372" y="301" fill="#22c55e">Active</text>
  </g>
  <!-- tech badge -->
  <rect x="48" y="362" width="92" height="24" rx="12" fill="#0a0e17" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="94" y="378" font-family="monospace" font-size="11" font-weight="700" fill="#06b6d4" text-anchor="middle">C++ / Qt</text>
</svg>
