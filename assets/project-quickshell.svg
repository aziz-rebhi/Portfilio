<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Quickshell Dynamic Island panel bar for Linux built with QML">
  <defs>
    <linearGradient id="qmlBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="tabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#qmlBg)"/>
  <!-- desktop background hint -->
  <rect x="40" y="50" width="520" height="300" rx="16" fill="#111827" stroke="#1e293b" stroke-width="2"/>
  <circle cx="80" cy="80" r="20" fill="#1e293b" opacity="0.6"/>
  <rect x="120" y="64" width="60" height="8" rx="4" fill="#1e293b" opacity="0.6"/>
  <rect x="190" y="64" width="40" height="8" rx="4" fill="#1e293b" opacity="0.6"/>
  <rect x="460" y="310" width="80" height="8" rx="4" fill="#1e293b" opacity="0.6"/>
  <rect x="420" y="326" width="120" height="8" rx="4" fill="#1e293b" opacity="0.6"/>
  <!-- Panel bar -- floating island style -->
  <rect x="60" y="80" width="480" height="42" rx="21" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <rect x="60" y="80" width="480" height="42" rx="21" fill="url(#tabGrad)" opacity="0.5"/>
  <!-- left section -- time -->
  <rect x="84" y="93" width="60" height="16" rx="8" fill="#1e293b"/>
  <text x="114" y="105" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">10:42</text>
  <!-- center -- media / cava -->
  <rect x="200" y="91" width="120" height="20" rx="6" fill="#1e293b" opacity="0.5"/>
  <rect x="208" y="95" width="4" height="12" rx="2" fill="#06b6d4"><animate attributeName="height" values="12;6;12" dur="0.6s" repeatCount="indefinite"/></rect>
  <rect x="216" y="93" width="4" height="16" rx="2" fill="#22d3ee"><animate attributeName="height" values="16;8;16" dur="0.5s" repeatCount="indefinite"/></rect>
  <rect x="224" y="95" width="4" height="12" rx="2" fill="#06b6d4"><animate attributeName="height" values="12;10;12" dur="0.7s" repeatCount="indefinite"/></rect>
  <rect x="232" y="97" width="4" height="8" rx="2" fill="#a855f7"><animate attributeName="height" values="8;14;8" dur="0.55s" repeatCount="indefinite"/></rect>
  <text x="256" y="105" font-family="monospace" font-size="10" fill="#64748b">Never Gonna Give...</text>
  <!-- right -- status capsule -->
  <rect x="430" y="91" width="90" height="20" rx="10" fill="#1e293b"/>
  <circle cx="440" cy="101" r="3" fill="#22c55e"/>
  <text x="448" y="105" font-family="monospace" font-size="10" fill="#94a3b8">Wi-Fi</text>
  <text x="492" y="105" font-family="monospace" font-size="10" fill="#22d3ee"> 86%</text>
  <!-- control center overlay -->
  <rect x="340" y="140" width="200" height="180" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <!-- audio slider -->
  <rect x="358" y="158" width="164" height="6" rx="3" fill="#1e293b"/>
  <rect x="358" y="158" width="110" height="6" rx="3" fill="#06b6d4"/>
  <circle cx="468" cy="161" r="5" fill="#22d3ee"/>
  <!-- wifi row -->
  <rect x="358" y="178" width="164" height="24" rx="8" fill="#1e293b"/>
  <text x="370" y="194" font-family="monospace" font-size="10" fill="#94a3b8">  MyNetwork  ████████  </text>
  <!-- bluetooth row -->
  <rect x="358" y="210" width="164" height="24" rx="8" fill="#1e293b"/>
  <text x="370" y="226" font-family="monospace" font-size="10" fill="#94a3b8">  Bluetooth OFF</text>
  <!-- brightness -->
  <rect x="358" y="246" width="164" height="6" rx="3" fill="#1e293b"/>
  <rect x="358" y="246" width="130" height="6" rx="3" fill="#a855f7"/>
  <!-- media player -->
  <rect x="358" y="266" width="164" height="36" rx="8" fill="#1e293b"/>
  <text x="374" y="284" font-family="monospace" font-size="9" fill="#64748b">Now Playing</text>
  <text x="374" y="296" font-family="monospace" font-size="10" fill="#c084fc">♫ Track Name</text>
  <!-- QR code hint small -->
  <rect x="500" y="290" width="22" height="22" rx="4" fill="#06b6d4" opacity="0.2"/>
  <rect x="503" y="295" width="16" height="4" rx="1" fill="#06b6d4" opacity="0.6"/>
  <rect x="503" y="303" width="8" height="4" rx="1" fill="#06b6d4" opacity="0.6"/>
  <!-- tech badge -->
  <rect x="48" y="362" width="110" height="24" rx="12" fill="#0a0e17" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="103" y="378" font-family="monospace" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">QML / Quickshell</text>
</svg>
